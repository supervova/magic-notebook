name: Feature request
description: Suggest an improvement or a new feature
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe your idea clearly.
        You may write in English or Russian.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: |
        I want to ...
        It is currently difficult to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - File manager
        - Search
        - Export
        - Sync
        - UI/UX
        - Website
        - Other

  - type: dropdown
    id: importance
    attributes:
      label: Importance
      options:
        - Nice to have
        - Useful
        - Very important

  - type: textarea
    id: references
    attributes:
      label: References or examples
      description: Optional links or screenshots

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues
          required: true
